<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackr - User Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body>

    <div class="glass-panel login-container" style="max-width: 500px;">
        <h1>Welcome, Sivaraj</h1>
        <p>Scan a QR Code to start sharing your live location with the Admin</p>

        <div class="qr-container"
            style="width: 100%; max-width: 300px; margin: 0 auto; overflow: hidden; border-radius: 12px;">
            <div id="reader"></div>
            <div id="result" style="margin-top: 1rem; color: var(--accent); font-weight: bold;"></div>
        </div>

        <div style="margin-top: 2rem;">
            <button class="btn" style="display: none; width: 100%;" id="trackBtn" onclick="startTracking()">Proceed to
                Tracking</button>
            <a href="#" onclick="logout()"
                style="color: var(--text-muted); text-decoration: none; display: block; margin-top: 1rem;">Log Out</a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('role') !== 'user') {
            window.location.href = '/index.html';
        }

        const userId = localStorage.getItem('userId') || 'sivaraj_1';
        let html5QrcodeScanner;

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('result').innerText = "QR Code Scanned Successfully!";

            // Automatically proceed to tracking or show the button
            // If the QR code contains the track URL, we can redirect directly
            // For now, we'll just redirect to the tracking page for this user
            startTracking();

            // Optional: if you prefer them to click a button, uncomment below:
            // document.getElementById('trackBtn').style.display = 'block';
            // html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
            // handle scan failure, usually ignored as it scans multiple times a second
        }

        window.onload = function () {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: { width: 250, height: 250 } },
                /* verbose= */ false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        };

        function startTracking() {
            const protocol = window.location.protocol;
            const host = window.location.host;
            window.location.href = `${protocol}//${host}/track.html?userId=${userId}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
    </script>

</body>

</html>
